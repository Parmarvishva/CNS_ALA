<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Digital Signature Verifier</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            body {
                background: #f5f7fa;
            }
            .header {
                text-align: center;
                margin-bottom: 30px;
            }
            .logo {
                width: 120px;
            }
            textarea {
                font-family: monospace;
            }
        </style>
    </head>
    <body class="p-4">
        <div class="container">
            <!-- HEADER -->
            <div class="header">
                <img src="../images/gmiu.webp" class="logo">
                <h2>Digital Signature Verifier</h2>
            </div>
            <!-- SECTION 1 -->
            <div class="card p-3 mb-3">
                <h5>1. Key Generation</h5>
                <button class="btn btn-primary mb-3" onclick="generateKeys()">Generate Keys</button>
                <div class="row">
                    <div class="col-md-6">
                        <label>Private Key</label>
                        <textarea id="privateKey" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label>Public Key</label>
                        <textarea id="publicKey" class="form-control" rows="4"></textarea>
                    </div>
                </div>
            </div>
            <!-- SECTION 2 -->
            <div class="card p-3 mb-3">
                <h5>2. Message</h5>
                <textarea id="messageInput" class="form-control mb-3" rows="3"></textarea>
                <button class="btn btn-success" onclick="signMessage()">Sign Message</button>
            </div>
            <!-- SECTION 3 -->
            <div class="card p-3">
                <h5>3. Verification</h5>
                <textarea id="signatureInput" class="form-control mb-3" rows="3"></textarea>
                <button class="btn btn-primary" onclick="verifySignature()">Verify</button>

                <div id="resultBanner" class="mt-3"></div>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <button class="btn btn-secondary" onclick="goTo('../index.html')">Home</button>
                <button class="btn btn-primary" onclick="goTo('ala2.html')">Next →</button>
            </div>
        </div>
        <script src="js/original_ala1.js"></script>
    </body>
</html>
